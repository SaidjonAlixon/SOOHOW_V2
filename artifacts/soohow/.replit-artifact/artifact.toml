kind = "web"
previewPath = "/"
title = "SOOHOW CENTRAL ASIA"
version = "1.0.0"
id = "artifacts/soohow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25993

[services.development]
run = "pnpm --filter @workspace/soohow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/soohow", "run", "build" ]
publicDir = "artifacts/soohow/build"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25993"
BASE_PATH = "/"
